<section class="hero" id="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-edition">5th International Workshop on</p>
    <h1 class="hero-title">Spatio-Temporal Reasoning<br>and Learning</h1>
    <p class="hero-meta">
      <span class="hero-date">{{ .Site.Params.workshopDate }}</span>
      <span class="hero-sep">&middot;</span>
      <span class="hero-venue">co-located with <a href="{{ .Site.Params.venueURL }}">{{ .Site.Params.venue }}</a></span>
      <span class="hero-sep">&middot;</span>
      <span class="hero-location">{{ .Site.Params.venueCity }}</span>
    </p>
    <div class="hero-actions">
      <a href="#cfp" class="btn btn-primary">Call for Papers</a>
      <a href="#program" class="btn btn-secondary">Program</a>
    </div>
  </div>
</section>
