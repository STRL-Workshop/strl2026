<section class="section" id="venue">
  <div class="container">
    <h2 class="section-title">Venue</h2>
    <div class="venue-content">
      <div class="venue-info">
        <p>The workshop will take place in <strong>{{ .Site.Params.venueCity }}</strong>, co-located with <a href="{{ .Site.Params.venueURL }}">{{ .Site.Params.venue }}</a>.</p>
        <p>Detailed venue information will be announced closer to the event.</p>
      </div>
      <div class="venue-map">
        <iframe
          title="Bremen, Germany map"
          width="100%"
          height="350"
          style="border:0; border-radius: 8px;"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.openstreetmap.org/export/embed.html?bbox=8.7400%2C53.0500%2C8.8700%2C53.1100&layer=mapnik&marker=53.0793%2C8.8017">
        </iframe>
        <p class="venue-map-link"><a href="https://www.openstreetmap.org/?#map=13/53.0793/8.8017" target="_blank" rel="noopener">View Larger Map</a></p>
      </div>
    </div>
  </div>
</section>
